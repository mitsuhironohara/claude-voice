<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Claude 音声アシスタント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
    --accent: #7c6af7; --accent2: #a78bfa; --text: #e2e2f0;
    --text-muted: #6b6b8a; --success: #4ade80; --error: #f87171; --recording: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 24px 16px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -200px; left: 50%;
    transform: translateX(-50%); width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 32px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-size: 22px; font-weight: 300; color: var(--text); letter-spacing: 0.05em; }
  .api-section, .system-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; margin-bottom: 20px;
  }
  .api-section label, .system-section label {
    display: block; font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 10px; font-family: 'Space Mono', monospace;
  }
  .api-row { display: flex; gap: 8px; }
  .api-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'Space Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--text-muted); }
  .btn-save {
    background: var(--accent); color: white; border: none;
    border-radius: 10px; padding: 12px 18px; font-size: 13px;
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
    transition: opacity 0.2s; white-space: nowrap;
  }
  .btn-save:hover { opacity: 0.85; }
  .api-status { margin-top: 8px; font-size: 12px; color: var(--text-muted); }
  .api-status.ok { color: var(--success); }
  .api-status.err { color: var(--error); }
  .system-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
    outline: none; resize: none; height: 80px;
    transition: border-color 0.2s; line-height: 1.6;
  }
  .system-input:focus { border-color: var(--accent); }
  .mic-area { display: flex; flex-direction: column; align-items: center; gap: 20px; margin: 8px 0 24px; }
  .mic-btn {
    width: 100px; height: 100px; border-radius: 50%;
    border: 2px solid var(--accent); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease; position: relative; outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .mic-btn::before {
    content: ''; position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(124,106,247,0.2); transition: all 0.3s;
  }
  .mic-btn.recording { border-color: var(--recording); background: rgba(249,115,22,0.08); animation: pulse 1.5s ease-in-out infinite; }
  .mic-btn.recording::before { border-color: rgba(249,115,22,0.3); animation: pulse-ring 1.5s ease-in-out infinite; }
  .mic-btn.thinking { border-color: var(--accent2); background: rgba(167,139,250,0.08); }
  .mic-btn.speaking { border-color: var(--success); background: rgba(74,222,128,0.08); animation: speak-pulse 0.8s ease-in-out infinite alternate; }
  @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.04)} }
  @keyframes pulse-ring { 0%,100%{inset:-8px;opacity:1}50%{inset:-20px;opacity:0.3} }
  @keyframes speak-pulse { from{transform:scale(1)}to{transform:scale(1.03)} }
  .mic-icon { width: 36px; height: 36px; color: var(--accent); transition: color 0.3s; }
  .mic-btn.recording .mic-icon { color: var(--recording); }
  .mic-btn.thinking .mic-icon { color: var(--accent2); }
  .mic-btn.speaking .mic-icon { color: var(--success); }
  .mic-label { font-size: 13px; color: var(--text-muted); letter-spacing: 0.05em; text-align: center; min-height: 20px; transition: color 0.3s; }
  .mic-label.recording { color: var(--recording); }
  .mic-label.thinking { color: var(--accent2); }
  .mic-label.speaking { color: var(--success); }
  .conversation { display: flex; flex-direction: column; gap: 14px; margin-bottom: 16px; }
  .message { padding: 14px 16px; border-radius: 14px; font-size: 14px; line-height: 1.7; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  .message.user { background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.2); align-self: flex-end; max-width: 90%; }
  .message.assistant { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; max-width: 100%; }
  .message-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 6px; }
  .message.user .message-label { color: var(--accent); }
  .message.assistant .message-label { color: var(--text-muted); }
  .btn-stop {
    background: transparent; border: 1px solid var(--error); color: var(--error);
    border-radius: 10px; padding: 10px 24px; font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; display: none; transition: all 0.2s;
  }
  .btn-stop.visible { display: block; }
  .btn-stop:hover { background: rgba(248,113,113,0.1); }
  .btn-clear {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 10px; padding: 10px 24px; font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; margin-top: 8px;
  }
  .btn-clear:hover { border-color: var(--text-muted); color: var(--text); }
  .actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2a1a1a; border: 1px solid var(--error); color: var(--error);
    padding: 12px 20px; border-radius: 12px; font-size: 13px;
    transition: transform 0.3s ease; z-index: 100;
    white-space: nowrap; max-width: 90vw; text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Voice Assistant</div>
    <h1>Claude に話しかける</h1>
  </header>
  <div class="api-section">
    <label>API キー</label>
    <div class="api-row">
      <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
      <button class="btn-save" onclick="saveKey()">保存</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>
  <div class="system-section">
    <label>システムプロンプト（任意）</label>
    <textarea class="system-input" id="systemPrompt" placeholder="例：日本語で短く答えてください。"></textarea>
  </div>
  <div class="mic-area">
    <button class="mic-btn" id="micBtn" onclick="toggleRecording()">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 006-6v-1.5m-6 7.5a6 6 0 01-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 01-3-3V4.5a3 3 0 116 0v8.25a3 3 0 01-3 3z"/>
      </svg>
    </button>
    <div class="mic-label" id="micLabel">タップして話す</div>
  </div>
  <div class="conversation" id="conversation"></div>
  <div class="actions">
    <button class="btn-stop" id="btnStop" onclick="stopSpeaking()">読み上げ停止</button>
    <button class="btn-clear" onclick="clearConversation()">会話をリセット</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  let apiKey = localStorage.getItem('claude_api_key') || '';
  let history = [];
  let recognition = null;
  let isRecording = false;
  let isSpeaking = false;
  let currentUtterance = null;
  let audioUnlocked = false;
  let resumeTimer = null;

  // 初期化
  if (apiKey) {
    document.getElementById('apiKey').value = apiKey;
    document.getElementById('apiStatus').textContent = '✓ キーが保存されています';
    document.getElementById('apiStatus').className = 'api-status ok';
  }
  document.getElementById('systemPrompt').value = '日本語で簡潔に答えてください。音声で聞きやすいよう、箇条書きや記号は使わずに自然な話し言葉で答えてください。';

  // iOS Safari: 音声APIを最初のタップで解放
  function unlockAudio() {
    if (audioUnlocked || !window.speechSynthesis) return;
    audioUnlocked = true;
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    u.rate = 10;
    window.speechSynthesis.speak(u);
  }

  function saveKey() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key.startsWith('sk-ant-')) { showStatus('キーの形式が正しくありません', 'err'); return; }
    apiKey = key;
    localStorage.setItem('claude_api_key', key);
    showStatus('✓ 保存しました', 'ok');
  }

  function showStatus(msg, type) {
    const el = document.getElementById('apiStatus');
    el.textContent = msg;
    el.className = 'api-status ' + type;
  }

  function toggleRecording() {
    unlockAudio();
    if (!apiKey) { showToast('先にAPIキーを保存してください'); return; }
    if (isSpeaking) { stopSpeaking(); return; }
    if (isRecording) { stopRecording(); return; }
    startRecording();
  }

  function startRecording() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast('このブラウザは音声認識に対応していません'); return; }
    recognition = new SR();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onstart = () => { isRecording = true; setMicState('recording', '話してください…'); };
    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      addMessage('user', text);
      setMicState('thinking', '考え中…');
      sendToClaude(text);
    };
    recognition.onerror = (e) => {
      isRecording = false;
      setMicState('idle', 'タップして話す');
      if (e.error !== 'aborted') showToast('音声認識エラー: ' + e.error);
    };
    recognition.onend = () => { isRecording = false; };
    recognition.start();
  }

  function stopRecording() {
    if (recognition) recognition.stop();
    isRecording = false;
    setMicState('idle', 'タップして話す');
  }

  async function sendToClaude(userText) {
    history.push({ role: 'user', content: userText });
    const systemPrompt = document.getElementById('systemPrompt').value.trim();
    const body = { model: 'claude-sonnet-4-5', max_tokens: 1024, messages: history };
    if (systemPrompt) body.system = systemPrompt;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) {
        showToast(data?.error?.message || 'APIエラー');
        history.pop();
        setMicState('idle', 'タップして話す');
        return;
      }
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);
      speak(reply);
    } catch (e) {
      showToast('通信エラーが発生しました');
      history.pop();
      setMicState('idle', 'タップして話す');
    }
  }

  function speak(text) {
    if (!window.speechSynthesis) { setMicState('idle', 'タップして話す'); return; }
    if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
    window.speechSynthesis.cancel();

    setTimeout(() => {
      currentUtterance = new SpeechSynthesisUtterance(text);
      currentUtterance.lang = 'ja-JP';
      currentUtterance.rate = 1.0;
      currentUtterance.pitch = 1.0;

      const voices = window.speechSynthesis.getVoices();
      const jaVoice = voices.find(v => v.lang === 'ja-JP') || voices.find(v => v.lang.startsWith('ja'));
      if (jaVoice) currentUtterance.voice = jaVoice;

      currentUtterance.onstart = () => {
        isSpeaking = true;
        setMicState('speaking', '読み上げ中…');
        document.getElementById('btnStop').classList.add('visible');
        // iOS Safari: 長文で途中停止するバグの回避
        resumeTimer = setInterval(() => {
          if (!window.speechSynthesis.speaking) { clearInterval(resumeTimer); resumeTimer = null; return; }
          window.speechSynthesis.pause();
          window.speechSynthesis.resume();
        }, 5000);
      };
      currentUtterance.onend = () => {
        isSpeaking = false;
        if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
        setMicState('idle', 'タップして話す');
        document.getElementById('btnStop').classList.remove('visible');
      };
      currentUtterance.onerror = () => {
        isSpeaking = false;
        if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
        setMicState('idle', 'タップして話す');
        document.getElementById('btnStop').classList.remove('visible');
      };
      window.speechSynthesis.speak(currentUtterance);
    }, 100);
  }

  // iOS: 音声リスト事前ロード
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    window.speechSynthesis.getVoices();
  }

  function stopSpeaking() {
    if (resumeTimer) { clearInterval(resumeTimer); resumeTimer = null; }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    isSpeaking = false;
    setMicState('idle', 'タップして話す');
    document.getElementById('btnStop').classList.remove('visible');
  }

  function setMicState(state, label) {
    const btn = document.getElementById('micBtn');
    const lbl = document.getElementById('micLabel');
    btn.className = 'mic-btn ' + (state === 'idle' ? '' : state);
    lbl.className = 'mic-label ' + (state === 'idle' ? '' : state);
    lbl.textContent = label;
  }

  function addMessage(role, text) {
    const conv = document.getElementById('conversation');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.innerHTML = '<div class="message-label">' + (role === 'user' ? 'あなた' : 'Claude') + '</div>' + escapeHtml(text);
    conv.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  function clearConversation() {
    history = [];
    document.getElementById('conversation').innerHTML = '';
    stopSpeaking();
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
